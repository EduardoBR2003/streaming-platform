server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: user-service-route
          uri: lb://user-service
          predicates:
            - Path=/users/**
        - id: catalog-service-route
          uri: lb://catalog-service
          predicates:
            - Path=/contents/**
        - id: streaming-service-route
          uri: lb://streaming-service
          predicates:
            - Path=/streaming/**
        - id: recommendation-service-route
          uri: lb://recommendation-service
          predicates:
            - Path=/recommendations/**

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true
